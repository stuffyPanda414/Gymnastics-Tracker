<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gymnastics Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{color-scheme:light;
 --bg:#f4f6f8;--card:#fff;--ink:#15202b;--muted:#5b6b7a;--line:#e1e7ec;
 --brand:#1f6feb;--brand-d:#1759c4;--good:#1a8f4c;--bad:#cc3344;--warn:#c77700;
 --pill:#eef3f9;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{padding:0 0 90px}
h1,h2,h3{margin:0}
button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-size:16px}
input,select{font-family:inherit;font-size:16px;border:1px solid var(--line);border-radius:10px;
 padding:11px 12px;width:100%;background:#fff;color:var(--ink)}
.wrap{max-width:560px;margin:0 auto;padding:14px}
.topbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:10px 14px 6px;
 display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
.topbar h1{font-size:19px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.back{background:var(--pill);color:var(--brand);padding:9px 13px;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin:12px 0;
 box-shadow:0 1px 2px rgba(20,40,60,.04)}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.spread{justify-content:space-between}
.btn{background:var(--brand);color:#fff;padding:15px;width:100%;font-weight:700;font-size:17px}
.btn:active{background:var(--brand-d)}
.btn.sec{background:var(--pill);color:var(--brand)}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn.danger{background:#fdecee;color:var(--bad)}
.btn.go{background:var(--good)}
.btn.sm{padding:10px 13px;width:auto;font-size:15px}
.menu .btn{margin:10px 0;text-align:left;display:flex;align-items:center;gap:12px}
.menu .emoji{font-size:22px}
.muted{color:var(--muted)}
.small{font-size:13px}
.lbl{font-size:13px;color:var(--muted);margin:14px 0 5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.chip{padding:11px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-weight:600;color:var(--ink)}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.chiprow{display:flex;flex-wrap:wrap;gap:9px}
.athrow{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--line);border-radius:12px;margin:9px 0;background:#fff}
.athrow.on{border-color:var(--brand);background:#eef4ff}
.check{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
.athrow.on .check{background:var(--brand);border-color:var(--brand)}
.stepper{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.stepper button{width:52px;height:48px;background:var(--pill);color:var(--brand);font-size:24px;font-weight:700;border-radius:0}
.stepper .val{min-width:54px;text-align:center;font-size:20px;font-weight:700}
.clock{font-variant-numeric:tabular-nums;font-weight:800}
.bigclock{font-size:40px;text-align:center;letter-spacing:.02em}
.slots{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0}
.slot{width:42px;height:46px;border-radius:10px;border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:var(--muted)}
.slot.filled{border-style:solid;border-color:var(--brand);background:#eef4ff;color:var(--ink)}
.slot.active{border-color:var(--brand);border-style:solid;box-shadow:0 0 0 3px #dbe8ff}
.keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.key{height:50px;background:var(--pill);color:var(--ink);font-weight:700;font-size:18px}
.key:active{background:#dde6ee}
.key.wide{grid-column:span 2}
.brk{font-size:14px;line-height:1.7}
.brk .num{font-weight:700;font-variant-numeric:tabular-nums}
.score-big{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
.tag.learn{background:#fff4e0;color:var(--warn)}
.tag.master{background:#e3f6ea;color:var(--good)}
.trend-up{color:var(--good);font-weight:700}
.trend-dn{color:var(--bad);font-weight:700}
.trend-fl{color:var(--muted);font-weight:700}
.listitem{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--line);border-radius:12px;margin:9px 0;background:#fff}
.listitem .grow{flex:1;min-width:0}
.listitem h3{font-size:16px}
.dot{font-size:11px}
.modal-bg{position:fixed;inset:0;background:rgba(15,25,35,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.modal{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:18px;max-height:92vh;overflow:auto}
.modal h2{font-size:18px;margin-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.done-badge{background:var(--good);color:#fff;font-weight:700;padding:5px 11px;border-radius:999px;font-size:13px}
canvas{max-width:100%}
.empty{text-align:center;color:var(--muted);padding:30px 10px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#15202b;color:#fff;padding:12px 18px;border-radius:12px;z-index:99;font-weight:600;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.hr{height:1px;background:var(--line);margin:14px 0}
a.link{color:var(--brand);font-weight:600;text-decoration:none}
.warnbox{background:#fff8e6;border:1px solid #ffe2a8;border-radius:12px;padding:11px;font-size:13px;color:#7a5a00}
</style>
</head>
<body>
<div class="topbar"><button class="back" id="backBtn" style="display:none">‹ Back</button><h1 id="title">Gymnastics Tracker</h1></div>
<div class="wrap" id="app"></div>

<script>
"use strict";
/* ---------------- storage ---------------- */
var KEY="gymTrackerV1";
var APPARATUS=["Floor","Horse","Rings","Vault","P-bars","High bar"];
function freshState(){return{athletes:[],skills:[],sets:[],
 settings:{missPenalty:2,perMinute:1,freeThreshold:5,defaultMade:5}};}
var S=freshState();
var _db=null,_uid=null,_ref=null,_rendered=false;

function _lsLoad(){try{var r=localStorage.getItem(KEY);if(r){var o=JSON.parse(r);
 o.athletes=o.athletes||[];o.skills=o.skills||[];o.sets=o.sets||[];
 o.settings=Object.assign(freshState().settings,o.settings||{});S=o;}}catch(e){}}

function _normalize(o){o=o||{};o.athletes=o.athletes||[];o.skills=o.skills||[];o.sets=o.sets||[];o.settings=Object.assign(freshState().settings,o.settings||{});return o;}
function _safeRender(){if(!_rendered){_rendered=true;render();}}

/* Safety net: if Firebase doesn't resolve in 6 seconds, render with localStorage */
setTimeout(function(){if(!_rendered){_lsLoad();_safeRender();}},6000);

document.getElementById("app").innerHTML='<p style="text-align:center;padding:40px;color:#5b6b7a">Loading…</p>';

/* ---------------- Firebase init ---------------- */
try{
 firebase.initializeApp({
  apiKey:"AIzaSyBqvVNT-0C9yHrOpepPjIMp22rlabCgrjY",
  authDomain:"gymnastics-tracker-3117d.firebaseapp.com",
  projectId:"gymnastics-tracker-3117d",
  storageBucket:"gymnastics-tracker-3117d.firebasestorage.app",
  messagingSenderId:"121368432274",
  appId:"1:121368432274:web:b2ee64b144c034a2a9e04b"
 });
 _db=firebase.firestore();
 firebase.auth().signInAnonymously().then(function(cred){
  _uid=cred.user.uid;
  // Shared document so every device (phone + computer) reads/writes the SAME data.
  // (Anonymous auth gives each device a different uid, so a per-uid path can never sync.)
  _ref=_db.doc("shared/"+KEY);
  var first=true;
  // Real-time listener: pushes remote changes to this device live.
  _ref.onSnapshot(function(doc){
   if(doc.metadata.hasPendingWrites)return; // ignore echo of our own local write
   if(doc.exists){
    S=_normalize(doc.data());
    try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}
    if(first){first=false;_safeRender();}
    else if(!document.querySelector(".modal-bg")&&view.name!=="live"){render();}
   }else{
    // first cloud load: migrate whatever is on this device, then push it up
    _lsLoad();
    if(S.athletes.length||S.skills.length||S.sets.length)save();
    first=false;_safeRender();
   }
  },function(e){
   console.error("Firestore listen error, using localStorage:",e);
   _lsLoad();_safeRender();
  });
 }).catch(function(e){
  console.error("Firebase auth error, using localStorage:",e);
  _lsLoad();_safeRender();
 });
}catch(e){
 console.error("Firebase SDK unavailable, using localStorage:",e);
 _lsLoad();_safeRender();
}

function save(){
 try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}
 if(_ref){_ref.set(JSON.parse(JSON.stringify(S))).catch(function(e){console.error("Cloud save failed:",e);});}
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* ---------------- helpers ---------------- */
function fmt(sec){sec=Math.max(0,Math.round(sec));var m=Math.floor(sec/60),s=sec%60;return m+":"+(s<10?"0":"")+s;}
function parseTime(str){str=(str||"").trim();if(/^\d+$/.test(str))return parseInt(str,10);
 var p=str.split(":");if(p.length!==2)return null;var m=parseInt(p[0],10),s=parseInt(p[1],10);
 if(isNaN(m)||isNaN(s)||s<0||s>59)return null;return m*60+s;}
function skillById(id){return S.skills.find(function(k){return k.id===id;});}
function athById(id){return S.athletes.find(function(a){return a.id===id;});}
function esc(t){return String(t==null?"":t).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function toast(m){var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);
 setTimeout(function(){t.style.transition="opacity .4s";t.style.opacity="0";setTimeout(function(){t.remove();},400);},1600);}
/* sandbox blocks native prompt/confirm/alert, so use in-page dialogs */
function modalPrompt(title,def,cb){
 var bg=document.createElement("div");bg.className="modal-bg";
 var m=document.createElement("div");m.className="modal";bg.appendChild(m);
 m.innerHTML='<h2>'+esc(title)+'</h2><input id="mp_in" type="text" value="'+esc(def||"")+'">'+
  '<button class="btn go" id="mp_ok" style="margin-top:14px">OK</button>'+
  '<button class="btn ghost" id="mp_x" style="margin-top:8px">Cancel</button>';
 function close(){bg.remove();}
 bg.onclick=function(e){if(e.target===bg)close();};
 document.body.appendChild(bg);
 var inp=m.querySelector("#mp_in");inp.focus();inp.select();
 function ok(){var v=inp.value.trim();close();if(v&&cb)cb(v);}
 m.querySelector("#mp_ok").onclick=ok;
 m.querySelector("#mp_x").onclick=close;
 inp.addEventListener("keydown",function(e){if(e.key==="Enter")ok();});
}
function modalConfirm(msg,cb){
 var bg=document.createElement("div");bg.className="modal-bg";
 var m=document.createElement("div");m.className="modal";bg.appendChild(m);
 m.innerHTML='<h2>Confirm</h2><p style="margin:0 0 4px">'+esc(msg)+'</p>'+
  '<button class="btn danger" id="mc_ok" style="margin-top:14px">Yes</button>'+
  '<button class="btn ghost" id="mc_x" style="margin-top:8px">Cancel</button>';
 function close(){bg.remove();}
 bg.onclick=function(e){if(e.target===bg)close();};
 document.body.appendChild(bg);
 m.querySelector("#mc_ok").onclick=function(){close();if(cb)cb();};
 m.querySelector("#mc_x").onclick=close;
}

/* ---------------- scoring ---------------- */
function score(set){
 if(set.kind==="hold"){var hs=(set.holds||[]).map(Number).filter(function(x){return !isNaN(x);});
  var best=hs.length?Math.max.apply(null,hs):0;var avg=hs.length?hs.reduce(function(a,b){return a+b;},0)/hs.length:0;
  return{isHold:true,best:best,avg:avg,setScore:best,sum:0,missedPenalty:0,timePenalty:0,N:hs.length||1,avgQuality:0};}
 var st=S.settings;
 var scores=(set.scores||[]).map(Number).filter(function(x){return !isNaN(x);});
 var N=set.turnsRequired||scores.length||1;
 var sum=scores.reduce(function(a,b){return a+b;},0);
 var missedPenalty=(set.missed||0)*st.missPenalty;
 var minutes=Math.floor((set.elapsedSeconds||0)/60);
 var _skl=set.skillId?skillById(set.skillId):null;
 var thr=set.freeThreshold!=null?set.freeThreshold:((_skl&&_skl.freeThreshold!=null)?_skl.freeThreshold:st.freeThreshold);
 var over=Math.max(0,minutes-(thr-1));
 var timePenalty=over*st.perMinute;
 var raw=(sum-missedPenalty-timePenalty)/N;
 var val=Math.round(raw*100)/100;
 return{sum:sum,missedPenalty:missedPenalty,timePenalty:timePenalty,N:N,setScore:val,
  avgQuality:scores.length?sum/scores.length:0};
}

/* ---------------- router ---------------- */
var view={name:"home"};
var live=null; // live session object
function go(name,data){view={name:name,data:data||{}};render();}
document.getElementById("backBtn").onclick=function(){
 if(view.name==="live"){modalConfirm("Leave the live session? Unsaved sets are lost.",function(){live=null;go("home");});return;}
 var back=view.back||"home";go(back,view.backData);
};

function setHeader(t,showBack,backName,backData){
 document.getElementById("title").textContent=t;
 var b=document.getElementById("backBtn");
 b.style.display=showBack?"block":"none";
 view.back=backName;view.backData=backData;
}

/* ================= RENDER ================= */
function render(){
 var n=view.name;
 if(n==="home")return renderHome();
 if(n==="newApparatus")return renderNewApparatus();
 if(n==="newSkillpick")return renderPickSkill();
 if(n==="newAthletes")return renderPickAthletes();
 if(n==="live")return renderLive();
 if(n==="roster")return renderRoster();
 if(n==="skills")return renderSkills();
 if(n==="settings")return renderSettings();
 if(n==="backup")return renderBackup();
 if(n==="reports")return renderReports();
 if(n==="athleteReport")return renderAthleteReport();
 if(n==="drill")return renderDrill();
 if(n==="allsets")return renderAllSets();
 renderHome();
}

/* ---------------- HOME ---------------- */
function renderHome(){
 setHeader("Gymnastics Tracker",false);
 var a=document.getElementById("app");
 a.innerHTML=
 '<button class="btn go" id="start" style="font-size:19px;padding:18px;margin-top:6px">Start Session</button>'+
 '<div class="card menu">'+
   '<button class="btn sec" data-go="reports">Reports</button>'+
   '<button class="btn sec" data-go="allsets">All sets · add / edit</button>'+
   '<button class="btn sec" data-go="roster">Athletes</button>'+
   '<button class="btn sec" data-go="skills">Skills</button>'+
   '<button class="btn sec" data-go="settings">Scoring settings</button>'+
   '<button class="btn sec" data-go="backup">Backup &amp; publish</button>'+
 '</div>'+
 '<p class="muted small" style="text-align:center">'+S.athletes.length+' athletes · '+S.skills.length+' skills · '+S.sets.length+' sets saved</p>';
 a.querySelector("#start").onclick=function(){
  if(S.athletes.length===0){toast("Add an athlete first");go("roster");return;}
  if(S.skills.length===0){toast("Add a skill first");go("skills");return;}
  go("newApparatus");
 };
 a.querySelectorAll("[data-go]").forEach(function(b){b.onclick=function(){go(b.dataset.go);};});
}

/* ---------------- NEW SESSION: apparatus ---------------- */
function renderNewApparatus(){
 setHeader("Pick apparatus",true,"home");
 var a=document.getElementById("app");
 a.innerHTML='<div class="card"><div class="lbl">Apparatus</div><div class="chiprow" id="ap"></div></div>';
 var w=a.querySelector("#ap");
 APPARATUS.forEach(function(ap){
  var n=S.skills.filter(function(k){return k.apparatus===ap;}).length;
  var c=document.createElement("button");c.className="chip";c.innerHTML=esc(ap)+' <span class="muted small">'+n+'</span>';
  c.onclick=function(){go("newSkillpick",{apparatus:ap});};w.appendChild(c);
 });
}
function renderPickSkill(){
 var ap=view.data.apparatus;
 setHeader(ap+" · pick skill",true,"newApparatus");
 var a=document.getElementById("app");
 var ks=S.skills.filter(function(k){return k.apparatus===ap;});
 var h='<div class="card"><div class="lbl">Skill</div>';
 if(ks.length===0)h+='<p class="empty">No skills on '+esc(ap)+' yet.</p>';
 ks.forEach(function(k){
  h+='<button class="listitem" data-id="'+k.id+'" style="width:100%;text-align:left">'+
     '<span class="grow"><h3>'+esc(k.name)+'</h3>'+(k.type==="hold"?'<span class="muted small">hold · time only</span>':'')+'</span></button>';
 });
 h+='<div class="hr"></div><button class="btn sec sm" id="addsk">+ Add skill to '+esc(ap)+'</button></div>';
 a.innerHTML=h;
 a.querySelectorAll("[data-id]").forEach(function(b){b.onclick=function(){go("newAthletes",{apparatus:ap,skillId:b.dataset.id});};});
 a.querySelector("#addsk").onclick=function(){addSkillPrompt(ap,function(){go("newSkillpick",{apparatus:ap});});};
}
function renderPickAthletes(){
 var ap=view.data.apparatus,skillId=view.data.skillId;
 var sk=skillById(skillId);
 var isHold=sk.type==="hold";
 setHeader("Who's working it",true,"newSkillpick",{apparatus:ap});
 var a=document.getElementById("app");
 if(!view.data.sel)view.data.sel={};
 var sel=view.data.sel;
 if(view.data.made==null)view.data.made=S.settings.defaultMade;
 if(view.data.holds==null)view.data.holds=1;
 if(view.data.ft==null)view.data.ft=(sk.freeThreshold!=null?sk.freeThreshold:S.settings.freeThreshold);
 var h='<div class="card"><div class="muted small">'+esc(ap)+' · '+esc(sk.name)+(isHold?' · hold (time only)':'')+'</div>'+
   '<div class="lbl">Athletes participating</div><div id="ath"></div>';
 if(isHold){
  h+='<div class="lbl">Holds per gymnast</div>'+
     '<div class="row spread"><div class="stepper"><button id="hdn">−</button><div class="val" id="hv">'+view.data.holds+'</div><button id="hup">+</button></div>'+
     '<span class="muted small">longest hold is the headline</span></div>';
 }else{
  h+='<div class="lbl">Made turns required (whole session)</div>'+
     '<div class="row spread"><div class="stepper"><button id="mdn">−</button><div class="val" id="mv">'+view.data.made+'</div><button id="mup">+</button></div>'+
     '<span class="muted small">applies to every athlete</span></div>';
  h+='<div class="lbl">Time allotment (min free before penalty)</div>'+
     '<div class="row spread"><div class="stepper"><button id="fdn">−</button><div class="val" id="fv">'+view.data.ft+'</div><button id="fup">+</button></div>'+
     '<span class="muted small">this session</span></div>';
 }
 h+='</div><button class="btn go" id="begin">'+(isHold?'Start holds':'Start timer')+'</button>';
 a.innerHTML=h;
 var w=a.querySelector("#ath");
 S.athletes.forEach(function(at){
  var on=!!sel[at.id];
  var r=document.createElement("div");r.className="athrow"+(on?" on":"");
  r.innerHTML='<div class="check">'+(on?"✓":"")+'</div><div class="grow"><strong>'+esc(at.name)+'</strong></div>';
  r.onclick=function(){sel[at.id]=!sel[at.id];render();};w.appendChild(r);
 });
 if(isHold){
  a.querySelector("#hdn").onclick=function(){view.data.holds=Math.max(1,view.data.holds-1);render();};
  a.querySelector("#hup").onclick=function(){view.data.holds=Math.min(20,view.data.holds+1);render();};
 }else{
  a.querySelector("#mdn").onclick=function(){view.data.made=Math.max(1,view.data.made-1);render();};
  a.querySelector("#mup").onclick=function(){view.data.made=Math.min(20,view.data.made+1);render();};
  a.querySelector("#fdn").onclick=function(){view.data.ft=Math.max(0,view.data.ft-1);render();};
  a.querySelector("#fup").onclick=function(){view.data.ft=Math.min(60,view.data.ft+1);render();};
 }
 a.querySelector("#begin").onclick=function(){
  var ids=S.athletes.filter(function(x){return sel[x.id];}).map(function(x){return x.id;});
  if(ids.length===0){toast("Pick at least one athlete");return;}
  if(isHold)startLiveHold(ap,skillId,ids,view.data.holds);
  else startLive(ap,skillId,ids,view.data.made,view.data.ft);
 };
}

/* ---------------- LIVE SESSION ---------------- */
function startLive(apparatus,skillId,athleteIds,made,freeThreshold){
 live={kind:"reps",apparatus:apparatus,skillId:skillId,made:made,freeThreshold:freeThreshold,start:Date.now(),
  cards:athleteIds.map(function(id){return{athleteId:id,scores:[],missed:0,
   stopAt:null,saved:false};})};
 go("live");
}
function startLiveHold(apparatus,skillId,athleteIds,holdCount){
 live={kind:"hold",apparatus:apparatus,skillId:skillId,holdCount:holdCount,start:Date.now(),
  cards:athleteIds.map(function(id){return{athleteId:id,holds:[],running:false,holdStart:null,saved:false};})};
 go("live");
}
var liveTimer=null;
function renderLive(){
 var sk=skillById(live.skillId);
 var isHold=live.kind==="hold";
 setHeader("Live · "+sk.name,true,"home");
 var a=document.getElementById("app");
 var head=isHold

function buildCard(c,i){

 if(c.saved){d.innerHTML='<div class="row spread"><strong>'+esc(at.name)+'</strong><span class="done-badge">Saved '+c.savedScore.toFixed(2)+'</span></div>';return d;}

function buildHoldCard(c,i){

 if(c.saved){d.innerHTML='<div class="row spread"><strong>'+esc(ath.name)+'</strong><span class="done-badge">Best '+fmt(c.savedBest)+'</span></div>';return d;}
 var N=live.holdCount;

 var doneCount=c.holds.length;
 var h='<div class="row spread"><strong style="font-size:18px">'+esc(ath.name)+'</strong>'+

 h+='<div class="lbl">Holds ('+doneCount+'/'+N+')</div><div class="slots">';

 if(doneCount<N&&!c.running)h+='<div class="slot active"></div>';

 }
 d.innerHTML=h;

}

function buildCSV(athleteId){
 var rows=[["Date","Athlete","Apparatus","Skill","Type","Made turns","Turn scores","Turn sum","Missed","Missed penalty","Elapsed","Time penalty","Set score (/10)","Holds","Hold times","Longest hold"]];
 S.sets.slice().filter(function(s){return athleteId==null||s.athleteId===athleteId;})
  .sort(function(a,b){return a.date<b.date?-1:1;}).forEach(function(s){
  var at=athById(s.athleteId),k=skillById(s.skillId);
  if(setIsHold(s)){
   var hs=s.holds||[];var best=setBest(s);
   rows.push([s.date.slice(0,10),at?at.name:"?",s.apparatus,k?k.name:"?","Hold",
    "","","","","","","","",hs.length,hs.map(function(x){return fmt(x);}).join(" "),fmt(best)]);
  }else{
   var c=score(s);
   rows.push([s.date.slice(0,10),at?at.name:"?",s.apparatus,k?k.name:"?","Reps",
    s.turnsRequired,(s.scores||[]).join(" "),c.sum,s.missed,c.missedPenalty,fmt(s.elapsedSeconds),c.timePenalty,(s.setScore!=null?s.setScore.toFixed(2):""),"","",""]);
  }
 });
 return rows.map(function(r){return r.map(function(x){var v=String(x==null?"":x);
  return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(",");}).join("\n");
}

 });
 chain=chain.then(function(){
  return publishMaster().then(function(){done++;update();}).catch(function(){failed++;update();});
 });
 chain.then(function(){
  if(failed===0){toast("Published "+athletes.length+" report"+(athletes.length===1?"":"s")+" + master backup");btn.textContent="Published";}
  else{toast("Published "+done+", "+failed+" failed, check Drive connection");btn.textContent="Done with errors";}
  setTimeout(function(){btn.textContent=old;btn.disabled=false;},2500);
 });
}

/* ---------------- REPORTS ---------------- */
function trendArrow(scores){ // scores newest-first array of numbers
 if(scores.length<2)return '<span class="trend-fl">– new</span>';
 var d=scores[0]-scores[1];
 if(d>0.005)return '<span class="trend-up">▲ +'+d.toFixed(2)+'</span>';
 if(d<-0.005)return '<span class="trend-dn">▼ '+d.toFixed(2)+'</span>';
 return '<span class="trend-fl">▬ same</span>';
}
function setIsHold(s){if(s.kind)return s.kind==="hold";var k=skillById(s.skillId);return !!(k&&k.type==="hold");}
function setBest(s){if(s.best!=null)return s.best;var hs=s.holds||[];return hs.length?Math.max.apply(null,hs):0;}
function trendArrowTime(secs){
 if(secs.length<2)return '<span class="trend-fl">– new</span>';
 var d=secs[0]-secs[1];
 if(d>0.5)return '<span class="trend-up">▲ +'+Math.round(d)+'s</span>';
 if(d<-0.5)return '<span class="trend-dn">▼ '+Math.round(d)+'s</span>';
 return '<span class="trend-fl">▬ same</span>';
}
function setsFor(athleteId,skillId){
 return S.sets.filter(function(s){return s.athleteId===athleteId&&(!skillId||s.skillId===skillId);})
  .sort(function(a,b){return a.date<b.date?-1:1;});
}
function renderReports(){
 setHeader("Reports",true,"home");
 var a=document.getElementById("app");
 if(S.athletes.length===0){a.innerHTML='<p class="empty">No athletes yet.</p>';return;}
 var h='<p class="muted small">Pick an athlete to see progress.</p>';
 S.athletes.forEach(function(at){
  var n=setsFor(at.id).length;
  h+='<button class="listitem" data-id="'+at.id+'" style="width:100%;text-align:left">'+
     '<span class="grow"><h3>'+esc(at.name)+'</h3><span class="muted small">'+n+' set'+(n===1?"":"s")+'</span></span><span class="muted">›</span></button>';
 });
 a.innerHTML=h;
 a.querySelectorAll("[data-id]").forEach(function(b){b.onclick=function(){go("athleteReport",{athleteId:b.dataset.id});};});
}
function renderAthleteReport(){
 var at=athById(view.data.athleteId);
 setHeader(at.name,true,"reports");
 var a=document.getElementById("app");
 var all=setsFor(at.id);
 if(all.length===0){a.innerHTML='<p class="empty">No sets for '+esc(at.name)+' yet.</p>';return;}
 var bySkill={};all.forEach(function(s){(bySkill[s.skillId]=bySkill[s.skillId]||[]).push(s);});
 var h='<p class="muted small">Most recent score per skill.</p>';
 Object.keys(bySkill).forEach(function(skid){
  var arr=bySkill[skid];var k=skillById(skid);if(!k)return;
  var isHold=k.type==="hold";
  var latest=arr[arr.length-1];
  var trend=isHold?trendArrowTime(arr.slice().reverse().map(function(s){return setBest(s);})):trendArrow(arr.slice().reverse().map(function(s){return s.setScore;}));
  var head=isHold?fmt(setBest(latest)):latest.setScore.toFixed(2);
  h+='<button class="listitem" data-skid="'+skid+'" style="width:100%;text-align:left">'+
     '<span class="grow"><h3>'+esc(k.name)+'</h3><span class="muted small">'+esc(k.apparatus)+(isHold?' · hold':'')+' · '+arr.length+' sets · '+trend+'</span></span>'+
     '<span class="score-big" style="font-size:26px">'+head+'</span></button>';
 });
 a.innerHTML=h;
 a.querySelectorAll("[data-skid]").forEach(function(b){b.onclick=function(){go("drill",{athleteId:at.id,skillId:b.dataset.skid});};});
}
var charts=[];
function destroyCharts(){charts.forEach(function(c){try{c.destroy();}catch(e){}});charts=[];}
function renderDrill(){
 destroyCharts();
 var at=athById(view.data.athleteId),k=skillById(view.data.skillId);
 setHeader(at.name+" · "+k.name,true,"athleteReport",{athleteId:at.id});
 var a=document.getElementById("app");
 var arr=setsFor(at.id,k.id);
 var labels=arr.map(function(s){return s.date.slice(5,10);});
 if(k.type==="hold"){
  var wwH=weekCompareHold(arr);
  var hH='<div class="card"><div class="row spread"><strong>Week over week</strong></div>'+wwH+'</div>';
  hH+='<div class="card"><div class="lbl">Longest hold (seconds)</div><div style="height:200px"><canvas id="c1"></canvas></div></div>';
  hH+='<div class="card"><div class="lbl">Average hold (seconds)</div><div style="height:180px"><canvas id="c2"></canvas></div></div>';
  hH+='<div class="card"><div class="lbl">Sets — tap to edit</div><div id="setlist"></div></div>';
  a.innerHTML=hH;
  var slH=a.querySelector("#setlist");
  arr.slice().reverse().forEach(function(s){slH.appendChild(setRow(s,function(){go("drill",{athleteId:at.id,skillId:k.id});}));});
  mkChart("c1",labels,arr.map(function(s){return setBest(s);}),"Longest hold","#1f6feb",0);
  mkChart("c2",labels,arr.map(function(s){var hs=s.holds||[];return hs.length?Math.round(hs.reduce(function(a,b){return a+b;},0)/hs.length):0;}),"Avg hold","#1a8f4c",0);
  return;
 }
 var sc=arr.map(function(s){return score(s);});
 // week over week
 var ww=weekCompare(arr);
 var h='<div class="card"><div class="row spread"><strong>Week over week</strong></div>'+ww+'</div>';
 h+='<div class="card"><div class="lbl">Set score (out of 10)</div><div style="height:200px"><canvas id="c1"></canvas></div></div>';
 h+='<div class="card"><div class="lbl">Elapsed time (min)</div><div style="height:180px"><canvas id="c2"></canvas></div></div>';
 h+='<div class="card"><div class="lbl">Missed turns</div><div style="height:180px"><canvas id="c3"></canvas></div></div>';
 h+='<div class="card"><div class="lbl">Average turn quality</div><div style="height:180px"><canvas id="c4"></canvas></div></div>';
 h+='<div class="card"><div class="lbl">Sets — tap to edit</div><div id="setlist"></div></div>';
 a.innerHTML=h;
 var sl=a.querySelector("#setlist");
 arr.slice().reverse().forEach(function(s){sl.appendChild(setRow(s,function(){go("drill",{athleteId:at.id,skillId:k.id});}));});
 mkChart("c1",labels,arr.map(function(s){return s.setScore;}),"Set score","#1f6feb",0,10);
 mkChart("c2",labels,arr.map(function(s){return Math.round(s.elapsedSeconds/60*100)/100;}),"Minutes","#c77700");
 mkChart("c3",labels,arr.map(function(s){return s.missed;}),"Missed","#cc3344");
 mkChart("c4",labels,sc.map(function(c){return Math.round(c.avgQuality*100)/100;}),"Avg quality","#1a8f4c",0,10);
}
function mkChart(id,labels,data,label,color,min,max){
 var el=document.getElementById(id);if(!el)return;
 var opt={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
  scales:{y:{beginAtZero:min===0}}};
 if(min!=null)opt.scales.y.min=min;if(max!=null)opt.scales.y.max=max;
 charts.push(new Chart(el,{type:"line",data:{labels:labels,datasets:[{label:label,data:data,
  borderColor:color,backgroundColor:color+"22",tension:.25,fill:true,pointRadius:4,borderWidth:2}]},options:opt}));
}
function weekCompare(arr){
 if(arr.length===0)return '<p class="muted small">No data.</p>';
 var now=Date.now(),WK=7*24*3600*1000;
 function avg(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:null;}
 var thisW=[],lastW=[];
 arr.forEach(function(s){var age=now-new Date(s.date).getTime();
  if(age<=WK)thisW.push(s.setScore);else if(age<=2*WK)lastW.push(s.setScore);});
 var a1=avg(thisW),a0=avg(lastW);
 if(a1==null)return '<p class="muted small">No sets in the last 7 days.</p>';
 var h='<div class="brk">This week avg: <span class="num">'+a1.toFixed(2)+'</span> ('+thisW.length+' sets)';
 if(a0!=null){var d=a1-a0;h+='<br>Last week avg: <span class="num">'+a0.toFixed(2)+'</span> ('+lastW.length+' sets)'+
  '<br>Change: '+(d>=0?'<span class="trend-up">▲ +'+d.toFixed(2)+'</span>':'<span class="trend-dn">▼ '+d.toFixed(2)+'</span>');}
 else h+='<br><span class="muted">No sets the week before to compare.</span>';
 return h+'</div>';
}
function weekCompareHold(arr){
 if(arr.length===0)return '<p class="muted small">No data.</p>';
 var now=Date.now(),WK=7*24*3600*1000;
 function avg(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:null;}
 var thisW=[],lastW=[];
 arr.forEach(function(s){var age=now-new Date(s.date).getTime();var b=setBest(s);
  if(age<=WK)thisW.push(b);else if(age<=2*WK)lastW.push(b);});
 var a1=avg(thisW),a0=avg(lastW);
 if(a1==null)return '<p class="muted small">No holds in the last 7 days.</p>';
 var h='<div class="brk">This week best avg: <span class="num">'+fmt(a1)+'</span> ('+thisW.length+' sets)';
 if(a0!=null){var d=a1-a0;h+='<br>Last week best avg: <span class="num">'+fmt(a0)+'</span> ('+lastW.length+' sets)'+
  '<br>Change: '+(d>=0?'<span class="trend-up">▲ +'+Math.round(d)+'s</span>':'<span class="trend-dn">▼ '+Math.round(d)+'s</span>');}
 else h+='<br><span class="muted">No holds the week before to compare.</span>';
 return h+'</div>';
}

/* ---------------- ALL SETS + EDIT ---------------- */
function setRow(s,after){
 var at=athById(s.athleteId),k=skillById(s.skillId);
 var d=document.createElement("button");d.className="listitem";d.style.width="100%";d.style.textAlign="left";
 var main,sub;
 if(setIsHold(s)){
  main=fmt(setBest(s))+' <span class="muted small">best</span>';
  sub=s.date.slice(0,10)+' · '+esc(at?at.name:"?")+' · '+esc(k?k.name:"?")+' · '+(s.holds?s.holds.length:0)+' hold'+((s.holds&&s.holds.length===1)?"":"s");
 }else{
  main=(s.setScore!=null?s.setScore.toFixed(2):"0.00")+' <span class="muted small">/10</span>';
  sub=s.date.slice(0,10)+' · '+esc(at?at.name:"?")+' · '+esc(k?k.name:"?")+' · '+fmt(s.elapsedSeconds)+' · '+s.missed+' miss';
 }
 d.innerHTML='<span class="grow"><h3>'+main+'</h3><span class="muted small">'+sub+'</span></span><span class="muted">Edit</span>';
 d.onclick=function(){editSet(s.id,after);};
 return d;
}
function renderAllSets(){
 setHeader("All sets",true,"home");
 var a=document.getElementById("app");
 var h='<button class="btn sec" id="addset">+ Add a set manually</button>';
 if(S.sets.length===0)h+='<p class="empty">No sets saved yet.</p>';
 a.innerHTML=h+'<div id="list"></div>';
 var list=a.querySelector("#list");
 S.sets.slice().sort(function(x,y){return x.date<y.date?1:-1;}).forEach(function(s){list.appendChild(setRow(s,function(){render();}));});
 a.querySelector("#addset").onclick=function(){addSetManual();};
}
function addSetManual(){
 if(S.athletes.length===0){toast("Add an athlete first");return;}
 if(S.skills.length===0){toast("Add a skill first");return;}
 var sk=S.skills[0];var s;
 if(sk.type==="hold"){
  s={id:uid(),athleteId:S.athletes[0].id,skillId:sk.id,apparatus:sk.apparatus,
   kind:"hold",date:new Date().toISOString(),holds:[0],holdCount:1,best:0,elapsedSeconds:0,setScore:0};
 }else{
  s={id:uid(),athleteId:S.athletes[0].id,skillId:sk.id,apparatus:sk.apparatus,
   date:new Date().toISOString(),turnsRequired:S.settings.defaultMade,
   scores:new Array(S.settings.defaultMade).fill(0),missed:0,elapsedSeconds:0,
   freeThreshold:(sk.freeThreshold!=null?sk.freeThreshold:S.settings.freeThreshold)};
  s.setScore=score(s).setScore;
 }
 S.sets.push(s);save();
 editSet(s.id,function(){render();});
}
function editSet(id,after){
 var s=S.sets.find(function(x){return x.id===id;});if(!s)return;
 var bg=document.createElement("div");bg.className="modal-bg";
 function close(){bg.remove();}
 bg.onclick=function(e){if(e.target===bg)close();};
 function curKind(){var k=skillById(s.skillId);return (k&&k.type==="hold")?"hold":"reps";}
 function athOptsHtml(){return S.athletes.map(function(x){return '<option value="'+x.id+'"'+(x.id===s.athleteId?' selected':'')+'>'+esc(x.name)+'</option>';}).join("");}
 function skOptsHtml(){return S.skills.map(function(x){return '<option value="'+x.id+'"'+(x.id===s.skillId?' selected':'')+'>'+esc(x.apparatus)+' · '+esc(x.name)+(x.type==="hold"?' (hold)':'')+'</option>';}).join("");}
 function ensureKindFields(){
  if(curKind()==="hold"){
   if(s.kind!=="hold")s.kind="hold";
   if(!s.holds||!s.holds.length){var base=(s.scores&&s.scores.length)?s.scores.length:(s.holdCount||1);s.holds=new Array(base).fill(0);}
   if(s.holdCount==null)s.holdCount=s.holds.length;
  }else{
   if(s.kind==="hold"){s.kind="reps";if(!s.scores||!s.scores.length){var n=(s.holds&&s.holds.length)?s.holds.length:S.settings.defaultMade;s.scores=new Array(n).fill(0);s.turnsRequired=n;}}
   if(s.turnsRequired==null)s.turnsRequired=(s.scores&&s.scores.length)?s.scores.length:S.settings.defaultMade;
   if(!s.scores)s.scores=new Array(s.turnsRequired).fill(0);
   if(s.missed==null)s.missed=0;
   if(s.elapsedSeconds==null)s.elapsedSeconds=0;
  }
 }
 function bodyReps(){
  var c=score(s);
  var scoreInputs="";
  for(var j=0;j<s.turnsRequired;j++){scoreInputs+='<input type="number" min="0" max="10" step="0.5" data-sc="'+j+'" value="'+(s.scores[j]!=null?s.scores[j]:0)+'">';}
  return '<h2>Edit set</h2><div class="row spread"><span class="muted small">Live score</span><span class="score-big" style="font-size:26px">'+c.setScore.toFixed(2)+'</span></div>'+
   '<div class="brk muted">sum '+c.sum+' − miss '+c.missedPenalty+' − time '+c.timePenalty+' ÷ '+s.turnsRequired+'</div>'+
   '<div class="lbl">Athlete</div><select id="e_ath">'+athOptsHtml()+'</select>'+
   '<div class="lbl">Skill</div><select id="e_sk">'+skOptsHtml()+'</select>'+
   '<div class="lbl">Date</div><input id="e_date" type="date" value="'+s.date.slice(0,10)+'">'+
   '<div class="grid2"><div><div class="lbl">Made turns</div><input id="e_made" type="number" min="1" value="'+s.turnsRequired+'"></div>'+
   '<div><div class="lbl">Elapsed mm:ss</div><input id="e_time" type="text" value="'+fmt(s.elapsedSeconds)+'"></div></div>'+
   '<div class="lbl">Time allotment (min free before penalty)</div><input id="e_ft" type="number" min="0" value="'+(s.freeThreshold!=null?s.freeThreshold:S.settings.freeThreshold)+'">'+
   '<div class="lbl">Made-turn scores (0–10)</div><div class="grid2" id="scwrap">'+scoreInputs+'</div>'+
   '<div class="lbl">Missed turns</div><input id="e_miss" type="number" min="0" value="'+s.missed+'">'+
   '<button class="btn go" id="e_save" style="margin-top:14px">Save changes</button>'+
   '<button class="btn danger" id="e_del" style="margin-top:8px">Delete set</button>'+
   '<button class="btn ghost" id="e_close" style="margin-top:8px">Cancel</button>';
 }
 function bodyHold(){
  var hs=s.holds||[];var best=hs.length?Math.max.apply(null,hs):0;
  var holdInputs="";
  for(var j=0;j<hs.length;j++){holdInputs+='<input type="text" data-hold="'+j+'" value="'+fmt(hs[j])+'">';}
  return '<h2>Edit hold set</h2><div class="row spread"><span class="muted small">Longest hold</span><span class="score-big" style="font-size:26px">'+fmt(best)+'</span></div>'+
   '<div class="lbl">Athlete</div><select id="e_ath">'+athOptsHtml()+'</select>'+
   '<div class="lbl">Skill</div><select id="e_sk">'+skOptsHtml()+'</select>'+
   '<div class="lbl">Date</div><input id="e_date" type="date" value="'+s.date.slice(0,10)+'">'+
   '<div class="lbl">Number of holds</div><input id="e_hc" type="number" min="1" value="'+hs.length+'">'+
   '<div class="lbl">Hold times (mm:ss or seconds)</div><div class="grid2" id="hwrap">'+holdInputs+'</div>'+
   '<button class="btn go" id="e_save" style="margin-top:14px">Save changes</button>'+
   '<button class="btn danger" id="e_del" style="margin-top:8px">Delete set</button>'+
   '<button class="btn ghost" id="e_close" style="margin-top:8px">Cancel</button>';
 }
 var m=document.createElement("div");m.className="modal";bg.appendChild(m);document.body.appendChild(bg);
 var displayedKind="reps";
 function pull(){
  var ae=m.querySelector("#e_ath");if(ae)s.athleteId=ae.value;
  var se=m.querySelector("#e_sk");if(se){var sk=skillById(se.value);if(sk){s.skillId=sk.id;s.apparatus=sk.apparatus;}}
  var de=m.querySelector("#e_date");if(de&&de.value)s.date=new Date(de.value+"T12:00:00").toISOString();
  if(displayedKind==="hold"){
   var hce=m.querySelector("#e_hc");var hc=Math.max(1,parseInt(hce?hce.value:1,10)||1);
   var hold=[];m.querySelectorAll("[data-hold]").forEach(function(inp){var tt=parseTime(inp.value);hold.push(tt==null?0:Math.max(0,tt));});
   if(hc!==hold.length){if(hc<hold.length)hold=hold.slice(0,hc);else while(hold.length<hc)hold.push(0);}
   s.kind="hold";s.holds=hold;s.holdCount=hc;s.best=hold.length?Math.max.apply(null,hold):0;s.elapsedSeconds=s.best;s.setScore=s.best;
   delete s.scores;delete s.missed;delete s.turnsRequired;
  }else{
   var me=m.querySelector("#e_made");var made=Math.max(1,parseInt(me?me.value:1,10)||1);
   var te=m.querySelector("#e_time");var t=te?parseTime(te.value):null;if(t!=null)s.elapsedSeconds=t;
   var mie=m.querySelector("#e_miss");s.missed=Math.max(0,parseInt(mie?mie.value:0,10)||0);
   var fte=m.querySelector("#e_ft");var _ftv=fte?parseInt(fte.value,10):NaN;if(!isNaN(_ftv))s.freeThreshold=Math.max(0,_ftv);
   var sc=[];m.querySelectorAll("[data-sc]").forEach(function(inp){var v=parseFloat(inp.value);sc.push(isNaN(v)?0:Math.max(0,Math.min(10,v)));});
   if(s.turnsRequired==null)s.turnsRequired=sc.length;
   if(made!==s.turnsRequired){if(made<sc.length)sc=sc.slice(0,made);else while(sc.length<made)sc.push(0);}
   s.turnsRequired=made;
   s.kind="reps";s.scores=sc;delete s.holds;delete s.holdCount;delete s.best;s.setScore=score(s).setScore;
  }
 }
 function draw(){
  ensureKindFields();
  displayedKind=curKind();
  m.innerHTML=displayedKind==="hold"?bodyHold():bodyReps();
  m.querySelectorAll("input,select").forEach(function(inp){
   inp.addEventListener("change",function(){pull();draw();});});
  m.querySelector("#e_save").onclick=function(){pull();save();toast("Set updated");close();if(after)after();};
  m.querySelector("#e_del").onclick=function(){modalConfirm("Delete this set?",function(){S.sets=S.sets.filter(function(x){return x.id!==s.id;});save();toast("Set deleted");close();if(after)after();});};
  m.querySelector("#e_close").onclick=close;
 }
 draw();
}

// render() is called by the Firebase callback above, not here
</script>
